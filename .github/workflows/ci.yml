name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          shellcheck -s bash --severity=warning \
            launch.sh dashboard.sh harvest.sh costs.sh \
            lib/*.sh lib/drivers/*.sh \
            tests/test_*.sh tests/test.sh

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq bc
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq bash
      - name: Unit tests
        run: ./tests/test.sh --unit
